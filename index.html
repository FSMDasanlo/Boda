<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nos casamos!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="welcome-section">
        <div class="card">
            <div class="card-face card-front">
                <p class="wedding-date">6-6-2026</p>
                <div class="welcome-text">
                    <span class="lang-1">Bienvenidos</span>
                    <span class="lang-2">Welcome</span>
                    <span class="lang-3">Bienvenue</span>
                    <span class="lang-4">Willkommen</span>
                    <span class="lang-5">Benvenuti</span>
                </div>
                <div class="wedding-info">
                    <p class="wedding-message">
                        <span class="text-es">Es un día inolvidable para nosotros. Gracias por formar parte de él.</span>
                        <span class="text-en">It's an unforgettable day for us. Thank you for being a part of it.</span>
                    </p>
                    <a href="#" class="memory-button">
                        <span class="text-es">Déjanos un recuerdo</span>
                        <span class="text-en">Leave a message</span>
                    </a>
                </div>
            </div>
            <div class="card-face card-back">
                <h2>Tu mensaje</h2>
                <form action="#">
                    <textarea placeholder="Escribe aquí tus mejores deseos..."></textarea>
                    <button type="submit" class="submit-button">Enviar Recuerdo</button>
                </form>
                <button class="back-button">Volver</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
