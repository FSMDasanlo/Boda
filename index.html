<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nos casamos!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="welcome-section">
        <div class="card">
            <div class="card-face card-front">
                <p class="wedding-date">6-6-2026</p>
                <div class="welcome-text">
                    <span class="lang-1">Bienvenidos</span>
                    <span class="lang-2">Welcome</span>
                    <span class="lang-3">Bienvenue</span>
                    <span class="lang-4">Willkommen</span>
                    <span class="lang-5">Benvenuti</span>
                </div>
                <div class="wedding-info">
                    <p class="wedding-message">
                        <span class="text-es">Es un día inolvidable para nosotros. Gracias por formar parte de él.</span>
                        <span class="text-en">Today is an unforgettable day for us. Thank you for being a part of it.</span>
                    </p>
                    <a href="#" class="memory-button">
                        <span class="text-es">Déjanos un recuerdo</span>
                        <span class="text-en">Leave a message</span>
                    </a>
                </div>
            </div>
            <div class="card-face card-back">
                <div id="confirmation-message" class="confirmation-message">
                    <div class="confirmation-icon">&#10004;</div>
                    <p>¡Recuerdo enviado!</p>
                </div>
                <h2>Tu mensaje</h2>
                <form id="memory-form">
                    <input type="text" id="guest-name" class="name-input" placeholder="Tu nombre" required>
                    <!-- 1. Controles de edición de texto -->
                    <div class="editor-toolbar">
                        <select id="font-name" title="Tipo de fuente">
                            <option value="Lato">Normal</option>
                            <option value="Dancing Script">Cursiva</option>
                            <option value="Arial">Simple</option>
                            <option value="Georgia">Serif</option>
                        </select>
                        <select id="font-size" title="Tamaño de fuente">
                            <option value="3" selected>Mediano</option>
                            <option value="5">Grande</option>
                            <option value="2">Pequeño</option>
                        </select>
                        <input type="color" id="font-color" value="#20c997" title="Color de fuente">
                    </div>
                    <div id="message-box" class="editable" contenteditable="true" spellcheck="false"></div>
                    <div id="char-counter" class="char-counter"></div>
                    <div class="upload-section">
                        <button type="button" id="upload-photo-button">Añadir foto</button>
                        <input type="file" id="photo-upload" accept="image/*" hidden multiple>
                        <div id="image-preview-container"></div>
                    </div>
                    <button type="submit" class="submit-button">Enviar Recuerdo</button>
                </form>
                <button type="button" class="back-button">Volver</button>
            </div>
        </div>
    </main>

    <!-- Firebase Hosting SDKs (se inyectan automáticamente) -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/8.10.1/firebase-storage.js"></script>
    <script src="/__/firebase/init.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
